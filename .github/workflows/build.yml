name: Compilar APK Saldaterra

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Cache Buildozer
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: buildozer-

      - name: Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git \
            libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev \
            cmake autoconf libtool \
            pkg-config unzip \
            libsqlite3-dev

      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Compilar APK
        run: yes | buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Saldaterra-Impressora-APK
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload log se falhar
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-erro
          path: build.log
